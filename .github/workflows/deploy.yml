name: Deploy to production

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - "**/*.md"

  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend
        uses: actions/checkout@v6

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          timeout: 60s
          command_timeout: 5m
          debug: true
          script: |
            echo "Iniciando diagnóstico SSH..."
            
            echo "1. Usuario conectado por SSH:"
            whoami

            echo "2. Hostname del servidor:"
            hostname

            echo "3. Fecha del servidor:"
            date

            echo "4. Comprobando sudo hacia usuario wallaclone..."
            sudo -n -u wallaclone whoami

            echo "5. Comprobando carpeta del proyecto..."
            sudo -n -u wallaclone ls -la /home/wallaclone/kc-web19-gitgirls-finalproject-wallaclone

            echo "6. Comprobando carpeta del backend..."
            sudo -n -u wallaclone ls -la /home/wallaclone/kc-web19-gitgirls-finalproject-wallaclone/backend

            echo "Diagnóstico SSH finalizado correctamente."

  deploy-frontend:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install and build frontend
        run: |
          cd frontend/wallaclone
          npm install
          npm run build

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: frontend/wallaclone/dist/*
          target: /home/ubuntu/dist/
          strip_components: 3
