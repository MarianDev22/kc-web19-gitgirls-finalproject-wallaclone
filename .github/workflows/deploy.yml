name: Deploy to production

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - "**/*.md"

  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend
        uses: actions/checkout@v6

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          timeout: 60s
          command_timeout: 10m
          debug: true
          script: |
            echo "Iniciando deploy del backend..."

            sudo -u wallaclone bash -c '
            set -e
            
            echo "1. Actualizando el repositorio..."
            git -C /home/wallaclone/kc-web19-gitgirls-finalproject-wallaclone pull

            echo "2. Entrando en la carpeta del backend..."
            cd /home/wallaclone/kc-web19-gitgirls-finalproject-wallaclone/backend

            echo "3. Configurando la versión de Node..."
            export PATH="/home/wallaclone/.nvm/versions/node/v22.20.0/bin:$PATH"

            echo "4. Comprobando versiones de Node y npm"
            node -v
            npm -v

            echo "5. Instalando dependencias del backend..."
            npm ci

            echo "6. Compilando backend..."
            npm run build

            echo "7. Build del backend finalizado correctamente"
            '

            echo "8. Reiniciando el servicio del backend..."
            sudo supervisorctl restart wallaclone

            echo "Deploy del backend finalizado correctamente"

  deploy-frontend:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install and build frontend
        run: |
          cd frontend/wallaclone
          npm install
          npm run build

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: frontend/wallaclone/dist/*
          target: /home/ubuntu/dist/
          strip_components: 3
