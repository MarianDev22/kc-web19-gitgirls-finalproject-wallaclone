name: Deploy to production

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - "**/*.md"

jobs:
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend
        uses: actions/checkout@v6

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          command_timeout: 30m
          script: |
            sudo -u wallaclone bash -c '
            git -C /home/wallaclone/kc-web19-gitgirls-finalproject-wallaclone pull &&
            cd /home/wallaclone/kc-web19-gitgirls-finalproject-wallaclone/backend &&
            export PATH="/home/wallaclone/.nvm/versions/node/v22.20.0/bin:$PATH" &&
            npm install &&
            npm run build
            '
            sudo supervisorctl restart wallaclone

  deploy-frontend:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install and build frontend
        run: |
          cd frontend/wallaclone
          npm install
          npm run build

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: frontend/wallaclone/dist/*
          target: /home/ubuntu/dist/
          strip_components: 3
