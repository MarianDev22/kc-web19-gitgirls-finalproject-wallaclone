name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            sudo -u wallaclone git -C /home/wallaclone/kc-web19-gitgirls-finalproject-wallaclone pull
            cd /home/wallaclone/kc-web19-gitgirls-finalproject-wallaclone/backend
            sudo -u wallaclone npm install
            sudo supervisorctl restart wallaclone

  deploy-frontend:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: frontend/dist/*
          target: /home/ubuntu/dist/
          strip_components: 2
